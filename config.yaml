# ─────────────────────────────────────────────────────────────
# land_radar — конфиг поиска земельных участков под Белоостровом
# ─────────────────────────────────────────────────────────────

# Якорная точка — пос. Белоостров (Курортный р-н СПб)
anchor:
  name: "Белоостров"
  lat: 60.1656
  lon: 30.0050

# Жёсткие фильтры (лот отбрасывается, если не проходит)
hard:
  max_price_rub: 4000000
  max_distance_km: 20          # Phase 2 расширения: до 30
  min_area_sot: 4              # отсечь мусорные "доли"
  max_age_days: 30             # не старше N дней с даты публикации

# Мягкие критерии — идут в скоринг, не в отсев
soft:
  pine_keywords:  ["сосн", "хвойн", "бор", "лес"]
  water_keywords: ["озер", "река", "ручей", "пруд", "карьер", "водоём", "водоем", "берег"]
  named_water:    ["витриярви", "серебряный ручей", "осинка", "сертолово"]
  power_keywords: ["электр", "свет", "квт", "снт", "днп", "ижс"]
  # вес каждого критерия в итоговом score (0..100)
  weights:
    pine: 30
    water: 35
    named_water_bonus: 15
    power: 10
    road: 10

# Приоритетные локации (для построения запросов к источникам)
locations:
  primary:
    - "массив Белоостров Всеволожский район"
    - "Сертоловское городское поселение"
    - "Юкковское сельское поселение"
    - "Белоостров Курортный район"
    - "Солнечное Курортный район"
  fallback:
    - "Ленинское Выборгский район"
    - "Советский Выборгский район"
    - "Песочный Курортный район"
    - "Молодёжное Курортный район"

# Включённые источники. false → источник пропускается.
sources:
  bank_torgi:   true    # lot-online / РАД
  m_ets:        true    # МЭТС — банкротные торги
  alfalot:      true    # Alfalot — агрегатор банкротных лотов
  sberbank_ast: true    # Сбербанк-АСТ, раздел Bankruptcy (SPA, нужен POST-API)
  yandex:       true
  domclick:     true
  avito:        true    # JSON-API + curl_cffi (TLS-имитация) через прокси
  cian:         false   # припаркован

# Обогащение описаний через LLM (xAI Grok по умолчанию)
enrich:
  enabled: true
  provider: "grok"     # grok | claude | openai
  model: "grok-4.3"      # актуальная модель xAI (grok-2-latest ретайрнут)
  max_listings_per_run: 25   # лимит, чтобы не жечь токены

# Проверка природы по OpenStreetMap (Overpass) — лес/вода рядом по координатам
osm_nature:
  enabled: true
  radius_m: 1500       # искать лес/воду в этом радиусе от лота
