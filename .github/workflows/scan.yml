name: land_radar scan

on:
  schedule:
    # каждые 6 часов. Actions нередко стартует с задержкой — это ок для мониторинга.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write          # для коммита обновлённого state/

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency:
      group: land-radar
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          DACHA_DEBUG: "1"    # дамп сырого HTML в debug/; поставь "" когда селекторы устаканятся
          # Прокси для ВСЕХ запросов: requests читает эти переменные сам,
          # править код источников не нужно. Задаётся одним секретом.
          HTTP_PROXY:  ${{ secrets.DACHA_PROXY_URL }}
          HTTPS_PROXY: ${{ secrets.DACHA_PROXY_URL }}
        run: python scan.py

      - name: Commit state & debug
        run: |
          echo "=== содержимое debug/ после прогона ==="
          ls -la debug/ 2>/dev/null || echo "(папки debug нет — значит DACHA_DEBUG не сработал)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ debug/ 2>/dev/null || git add state/
          echo "=== staged ==="
          git status --short
          git diff --staged --quiet || git commit -m "state: scan $(date -u +%FT%TZ)"
          git push
